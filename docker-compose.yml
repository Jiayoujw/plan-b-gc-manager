# Teyvat Manager — Docker Compose 一键部署
# Phase 1: 基础框架

version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:7
    container_name: plan-b-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-log:/var/log/mongodb
    command: ["mongod", "--bind_ip", "0.0.0.0", "--port", "27017"]
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # 提瓦特管理台
  app:
    build: .
    container_name: plan-b-app
    restart: unless-stopped
    ports:
      - "8080:8080"   # Web 管理后台
      - "8081:8081"   # HTTPS 代理
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-teyvat-manager-secret-key-2024}
      - MONGO_URI=mongodb://mongodb:27017/grasscutter
    volumes:
      - ./data:/app/data
      - grasscutter-data:/app/grasscutter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login.html"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongo-data:
    driver: local
  mongo-log:
    driver: local
  grasscutter-data:
    driver: local
