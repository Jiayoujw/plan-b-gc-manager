<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 提瓦特管理台</title>
<style>
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --ink: #f8fafc;
    --muted: #94a3b8;
    --rule: #334155;
    --accent: #3b82f6;
    --accent2: #f59e0b;
    --danger: #ef4444;
    --success: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: var(--bg2);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .login-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .login-header h1 {
    font-size: 1.5rem;
    margin-bottom: 0.3rem;
  }
  .login-header p {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .form-group { margin-bottom: 1.2rem; }
  .form-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
    color: var(--muted);
  }
  .form-input {
    width: 100%;
    padding: 0.65rem 0.9rem;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 6px;
    color: var(--ink);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    padding: 0.7rem;
    border: none;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn.primary {
    background: var(--accent);
    color: #fff;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    color: var(--danger);
    font-size: 0.8rem;
    margin-top: 0.5rem;
    text-align: center;
    min-height: 1.2rem;
  }
  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 1rem;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <h1>提瓦特管理台</h1>
    <p>Grasscutter 私服综合管理平台</p>
  </div>
  <div class="form-group">
    <label class="form-label">用户名</label>
    <input type="text" class="form-input" id="username" placeholder="admin" value="admin">
  </div>
  <div class="form-group">
    <label class="form-label">密码</label>
    <input type="password" class="form-input" id="password" placeholder="admin123" value="admin123">
  </div>
  <button class="btn primary" id="loginBtn" onclick="doLogin()">登录</button>
  <div class="error-msg" id="errorMsg"></div>
  <div class="hint">默认账号: admin / admin123</div>
</div>

<script>
const API_BASE = 'http://localhost:8080/api';

// 如果已有 token 且未过期，直接进入
const token = localStorage.getItem('teyvat_token');
if (token) {
  fetch(API_BASE + '/status', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => { if (r.ok) window.location.href = '/'; })
    .catch(() => {});
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) { err.textContent = '请输入用户名和密码'; return; }

  btn.disabled = true;
  btn.textContent = '登录中...';
  err.textContent = '';

  try {
    const res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success && data.token) {
      localStorage.setItem('teyvat_token', data.token);
      localStorage.setItem('teyvat_user', JSON.stringify(data.user));
      window.location.href = '/';
    } else {
      err.textContent = data.message || '登录失败';
    }
  } catch (e) {
    err.textContent = '网络错误';
  } finally {
    btn.disabled = false;
    btn.textContent = '登录';
  }
}

document.getElementById('password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
